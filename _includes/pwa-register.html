<script>
(function () {
  if (!('serviceWorker' in navigator)) return;

  window.addEventListener('load', function () {
    if (!window.__pwaSwRegisterPromise) {
      window.__pwaSwRegisterPromise = navigator.serviceWorker.register('/service-worker.js');
    }
    window.__pwaSwRegisterPromise.catch(function () {});
  });
})();
</script>
